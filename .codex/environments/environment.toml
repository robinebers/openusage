# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "openusage"

[setup]
script = '''
#!/usr/bin/env bash
set -euo pipefail

# Install dependencies
bun install

# Sync config directories from source tree into the worktree
for d in .agents .claude .codex .cursor; do
  if [ -d "$CODEX_SOURCE_TREE_PATH/$d" ]; then
    mkdir -p "$CODEX_WORKTREE_PATH/$d"
    rsync -a "$CODEX_SOURCE_TREE_PATH/$d/." "$CODEX_WORKTREE_PATH/$d/"
  fi
done

# Copy env files if they exist in the source tree
for f in .env .env.example; do
  if [ -f "$CODEX_SOURCE_TREE_PATH/$f" ]; then
    cp "$CODEX_SOURCE_TREE_PATH/$f" "$CODEX_WORKTREE_PATH/$f"
  fi
done

'''

[[actions]]
name = "Dev Server"
icon = "run"
command = "bun tauri dev"
