name: Feature Request
description: Suggest a UsageMeter improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        UsageMeter focuses on Windows usage tracking for AI coding subscriptions.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
